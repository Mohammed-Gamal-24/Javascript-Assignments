<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment (111 : 114) / Part 2</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <fieldset>
        <form action="">
            <label for="name">Your Name</label>
            <input type="text" name="name" id="name" placeholder="Your Valid Name" minlength="15" maxlength="20">
            <br>
            <label for="age">Your Age</label>
            <input type="number" name="age" id="age" placeholder="Your Age" min="2" max="2" required>
            <br>
            <label for="email">Your Email</label>
            <input type="email" name="email" id="email" placeholder="Write Valid Email" required>
            <br>
            <label for="country">Choose You Country</label>
            <select name="country" id="country">
                <option value="Egypt">Egypt</option>
                <option value="Saudi Arabia">Saudi Arabia</option>
                <option value="Tunisia">Tunisia</option>
                <option value="Marocco">Marocco</option>
                <option value="Algeria">Algeria</option>
            </select>
        </form>
    </fieldset> 
    <script src="main.js"></script>
</body>
</html>
