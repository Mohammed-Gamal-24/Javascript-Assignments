<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Learn JavaScript</title>
    <script>
        window.onload = function () {
            for (let i = 0; i < document.links.length; i++) { // for (let TargerLink of document.links) {
                let targetLink = document.links[i]
                if (targetLink.classList.contains("open") && targetLink.textContent === "Elzero") {
                    window.open(targetLink.href, "_blank")
                    // targetLink.click()
                }
            }
        }
    </script>
</head>
<body>
    <a class="open" href="https://google.com">Google</a>
    <a class="open" href="https://elzero.org">Elzero</a>
    <a class="not" href="https://facebook.com">Facebook</a>
    <a class="linked" href="https://linkedin.com">Elzero</a>
  </body>
</html>
